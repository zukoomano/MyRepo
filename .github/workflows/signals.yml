name: Metal Signals

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (UTC)
  workflow_dispatch:          # lets you run it manually from the Actions tab

# Allow the workflow to commit the updated state.json back to the repo
permissions:
  contents: write

# Prevent overlapping runs
concurrency:
  group: metal-signals
  cancel-in-progress: false

jobs:
  run-signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run signal engine
        env:
          OANDA_KEY: ${{ secrets.OANDA_KEY }}
          OANDA_ENV: ${{ secrets.OANDA_ENV }}
          TG_TOKEN: "AAFgXZs_C_EpL4-r6jHEJGZoUH_Q_-RZefE"
          TG_CHAT:   "@metalsignalsrk"
        run: node run.js

      - name: Save state (so signals don't repeat)
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "signal-bot"
            git config user.email "bot@users.noreply.github.com"
            git add state.json
            git commit -m "update signal state [skip ci]"
            git push
          else
            echo "No state change to commit."
          fi
